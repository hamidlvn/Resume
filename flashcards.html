<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فلش کارت افعال ایتالیایی</title>
<style>
  :root{
    --bg:#f4f1ea;
    --card-bg:#ffffff;
    --ink:#2b2620;
    --muted:#8a8378;
    --accent:#b5562d;
    --accent-2:#3f6b4f;
    --green:#3f9d5c;
    --red:#c9483e;
    --border:#e3ddd0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;
    height:100%;
    height:100dvh;
  }
  body{
    font-family:'Vazirmatn','Tahoma',sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:8px 12px 6px;
    overflow:hidden;
  }
  h1{
    font-size:0.95rem;
    font-weight:600;
    margin:0 0 6px;
    color:var(--ink);
    text-align:center;
    flex-shrink:0;
  }
  .toolbar{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:5px;
    width:100%;
    flex-shrink:0;
  }
  select, .btn-small{
    font-family:inherit;
    font-size:0.72rem;
    padding:5px 7px;
    border-radius:7px;
    border:1px solid var(--border);
    background:var(--card-bg);
    color:var(--ink);
  }
  .progress-wrap{
    width:100%;
    text-align:center;
    color:var(--muted);
    font-size:0.72rem;
    margin-bottom:5px;
    flex-shrink:0;
  }
  .scene{
    width:100%;
    max-width:440px;
    flex:1;
    min-height:0;
    perspective:1400px;
  }
  .card{
    position:relative;
    width:100%;
    height:100%;
    transition:transform .45s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
    cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    border-radius:16px;
    background:var(--card-bg);
    border:1px solid var(--border);
    box-shadow:0 4px 16px rgba(0,0,0,.07);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:14px 16px;
    overflow:hidden;
  }
  .face.back{
    transform:rotateY(180deg);
    justify-content:flex-start;
    padding-top:12px;
  }
  .word{
    font-family:'Georgia',serif;
    font-size:clamp(1.6rem,5vw,2.2rem);
    font-weight:700;
    color:var(--ink);
    direction:ltr;
    margin-bottom:4px;
    text-align:center;
  }
  .cat-tag{
    font-size:0.65rem;
    color:var(--muted);
    direction:ltr;
    margin-bottom:14px;
  }
  .play-btn{
    border:none;
    background:var(--accent);
    color:#fff;
    width:48px;
    height:48px;
    border-radius:50%;
    font-size:1.2rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 3px 8px rgba(181,86,45,.3);
    flex-shrink:0;
  }
  .play-btn:active{transform:scale(.9);}
  .play-btn.small{
    width:26px;
    height:26px;
    font-size:0.7rem;
    background:var(--accent-2);
    box-shadow:none;
  }
  .hint{
    margin-top:12px;
    font-size:0.7rem;
    color:var(--muted);
  }
  .back-word{
    direction:ltr;
    font-family:'Georgia',serif;
    font-size:1.1rem;
    font-weight:700;
    margin-bottom:1px;
  }
  .back-fa{
    font-size:0.88rem;
    font-weight:600;
    color:var(--accent);
    margin-bottom:6px;
  }
  .section-title{
    align-self:flex-start;
    font-size:0.65rem;
    color:var(--muted);
    margin:4px 0 2px;
    border-bottom:1px solid var(--border);
    width:100%;
    padding-bottom:2px;
    flex-shrink:0;
  }
  .example-it{
    direction:ltr;
    text-align:left;
    width:100%;
    font-size:0.78rem;
    margin-bottom:1px;
    flex-shrink:0;
  }
  .example-fa{
    width:100%;
    font-size:0.72rem;
    color:var(--muted);
    margin-bottom:2px;
    flex-shrink:0;
  }
  .conj-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding:2px 0;
    font-size:0.78rem;
    direction:ltr;
    border-bottom:1px dashed var(--border);
    flex-shrink:0;
  }
  .conj-row .pronoun{
    color:var(--muted);
    width:60px;
    flex-shrink:0;
  }
  .conj-row .form{
    flex:1;
    text-align:left;
    font-weight:600;
  }
  .conj-row.playing{
    background:#fdf0e7;
    border-radius:5px;
    padding-left:4px;
  }
  .conj-row.playing .form{color:var(--accent);}
  .controls{
    display:flex;
    gap:8px;
    margin-top:6px;
    width:100%;
    max-width:440px;
    justify-content:center;
    flex-shrink:0;
  }
  .nav-btn{
    flex:1;
    padding:10px 6px;
    border-radius:11px;
    border:none;
    font-size:0.82rem;
    font-family:inherit;
    cursor:pointer;
  }
  .btn-wrong{background:#fbe7e4;color:var(--red);}
  .btn-correct{background:#e3f3e7;color:var(--green);}
  .btn-flip{background:var(--ink);color:#fff;}
  .nav-row{
    display:flex;
    gap:6px;
    width:100%;
    max-width:440px;
    margin-top:5px;
    flex-shrink:0;
  }
  .nav-row button{
    flex:1;
    padding:8px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--card-bg);
    font-family:inherit;
    font-size:0.8rem;
    cursor:pointer;
  }
  .history{
    display:flex;
    gap:4px;
    justify-content:center;
    margin-top:5px;
    flex-wrap:wrap;
    width:100%;
    max-width:440px;
    flex-shrink:0;
  }
  .hist-box{
    width:22px;
    height:22px;
    border-radius:5px;
    background:#e9e5db;
    border:1px solid var(--border);
  }
  .hist-box.green{background:var(--green);border-color:var(--green);}
  .hist-box.red{background:var(--red);border-color:var(--red);}
  .stats{
    margin-top:4px;
    font-size:0.65rem;
    color:var(--muted);
    text-align:center;
    flex-shrink:0;
  }
</style>
</head>
<body>

<h1>فلش کارت افعال ایتالیایی 🇮🇹</h1>

<div class="toolbar">
  <select id="categoryFilter"></select>
  <select id="orderMode">
    <option value="seq">ترتیب اصلی</option>
    <option value="shuffle">تصادفی</option>
  </select>
  <select id="voiceSelect"></select>
  <button class="btn-small" id="resetProgressBtn">پاک‌کردن سابقه</button>
</div>

<div class="progress-wrap">
  <div class="counter" id="counter">۱ / ۳۸۴</div>
</div>

<div class="scene">
  <div class="card" id="card">
    <div class="face front">
      <div class="word" id="frontWord">verbo</div>
      <div class="cat-tag" id="frontCat">-are</div>
      <button class="play-btn" id="playFront" title="پخش تلفظ">🔊</button>
      <div class="hint">برای دیدن معنی روی کارت بزن</div>
    </div>
    <div class="face back">
      <div class="back-word" id="backWord">verbo</div>
      <button class="play-btn small" id="playBack" title="پخش تلفظ" style="position:absolute; top:16px; left:16px;">🔊</button>
      <div class="back-fa" id="backFa">معنی</div>

      <div class="section-title">مثال</div>
      <div class="example-it" id="exampleIt">Esempio.</div>
      <div class="example-fa" id="exampleFa">مثال فارسی</div>

      <div class="section-title">صرف زمان حال ساده</div>
      <div id="conjList"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="nav-btn btn-wrong" id="wrongBtn">غلط ❌</button>
  <button class="nav-btn btn-flip" id="flipBtn">برگردون 🔄</button>
  <button class="nav-btn btn-correct" id="correctBtn">درست ✅</button>
</div>

<div class="nav-row">
  <button id="prevBtn">⏮ قبلی</button>
  <button id="nextBtn">بعدی ⏭</button>
</div>

<div class="history" id="history"></div>
<div class="stats" id="stats"></div>

"cat": "-ire", "group": "IRE - -isc", "verb": "ubbidire", "fa": "اطاعت کردن", "forms": {"io": "ubbidisco", "tu": "ubbidisci", "lui/lei": "ubbidisce", "noi": "ubbidiamo", "voi": "ubbidite", "loro": "ubbidiscono"}, "example_it": "I bambini ubbidiscono ai genitori.", "example_fa": "بچه‌ها از والدین اطاعت می‌کنند."}, {"cat": "-ire", "group": "IRE - -isc", "verb": "unire", "fa": "متحد/وصل کردن", "forms": {"io": "unisco", "tu": "unisci", "lui/lei": "unisce", "noi": "uniamo", "voi": "unite", "loro": "uniscono"}, "example_it": "Uniamo le due squadre in una sola.", "example_fa": "دو تیم را در یکی متحد می‌کنیم."}, {"cat": "-ire", "group": "IRE - irregular esco", "verb": "uscire", "fa": "بیرون رفتن", "forms": {"io": "esco", "tu": "esci", "lui/lei": "esce", "noi": "usciamo", "voi": "uscite", "loro": "escono"}, "example_it": "Usciamo stasera a cena?", "example_fa": "امشب برای شام بیرون برویم؟"}, {"cat": "-ire", "group": "IRE - irregular vengo", "verb": "venire", "fa": "آمدن", "forms": {"io": "vengo", "tu": "vieni", "lui/lei": "viene", "noi": "veniamo", "voi": "venite", "loro": "vengono"}, "example_it": "Vieni con noi al cinema?", "example_fa": "با ما به سینما می‌آیی؟"}, {"cat": "-ire", "group": "IRE - regular/isc", "verb": "vestire", "fa": "پوشیدن/لباس پوشاندن", "forms": {"io": "vesto", "tu": "vesti", "lui/lei": "veste", "noi": "vestiamo", "voi": "vestite", "loro": "vestono"}, "example_it": "Veste sempre con eleganza.", "example_fa": "همیشه شیک لباس می‌پوشد."}, {"cat": "-ere", "group": "ERE - tenere group", "verb": "tenere", "fa": "نگه داشتن/داشتن", "forms": {"io": "tengo", "tu": "tieni", "lui/lei": "tiene", "noi": "teniamo", "voi": "tenete", "loro": "tengono"}, "example_it": "Tieni questa borsa per un attimo.", "example_fa": "این کیف را یک لحظه نگه دار."}, {"cat": "-ere", "group": "ERE - tenere group", "verb": "appartenere", "fa": "تعلق داشتن/متعلق بودن", "forms": {"io": "appartengo", "tu": "appartieni", "lui/lei": "appartiene", "noi": "apparteniamo", "voi": "appartenete", "loro": "appartengono"}, "example_it": "Questo libro appartiene alla biblioteca.", "example_fa": "این کتاب متعلق به کتابخانه است."}];

const STORAGE_KEY = 'it_flashcards_progress_v1';
let progress = {};
try{
  progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
}catch(e){ progress = {}; }

function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }catch(e){}
}

let order = VERBS.map((_,i)=>i);
let pos = 0;
let flipped = false;
let conjRows = [];

const categoryFilter = document.getElementById('categoryFilter');
const orderMode = document.getElementById('orderMode');
const cardEl = document.getElementById('card');
const frontWord = document.getElementById('frontWord');
const frontCat = document.getElementById('frontCat');
const backWord = document.getElementById('backWord');
const backFa = document.getElementById('backFa');
const exampleIt = document.getElementById('exampleIt');
const exampleFa = document.getElementById('exampleFa');
const conjList = document.getElementById('conjList');
const counter = document.getElementById('counter');
const historyEl = document.getElementById('history');
const statsEl = document.getElementById('stats');

// build category dropdown
const cats = ['همه', ...Array.from(new Set(VERBS.map(v=>v.cat)))];
cats.forEach(c=>{
  const opt = document.createElement('option');
  opt.value = c;
  opt.textContent = c === 'همه' ? 'همه دسته‌ها' : c;
  categoryFilter.appendChild(opt);
});

function toFaDigits(n){
  const map = {'0':'۰','1':'۱','2':'۲','3':'۳','4':'۴','5':'۵','6':'۶','7':'۷','8':'۸','9':'۹'};
  return String(n).split('').map(ch=>map[ch] ?? ch).join('');
}

function buildOrder(){
  const cat = categoryFilter.value;
  let idxs = VERBS.map((_,i)=>i);
  if(cat && cat !== 'همه'){
    idxs = idxs.filter(i=>VERBS[i].cat === cat);
  }
  if(orderMode.value === 'shuffle'){
    for(let i=idxs.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [idxs[i],idxs[j]] = [idxs[j],idxs[i]];
    }
  }
  order = idxs;
  pos = 0;
}

function currentVerb(){
  return VERBS[order[pos]];
}

const voiceSelect = document.getElementById('voiceSelect');
let italianVoices = [];
let chosenVoice = null;

function rankVoice(v){
  // prefer network/cloud voices (sound much more natural) over local/compact ones
  const name = (v.name || '').toLowerCase();
  let score = 0;
  if(!v.localService) score += 5; // network voice
  if(name.includes('google')) score += 4;
  if(name.includes('online') || name.includes('natural') || name.includes('neural')) score += 3;
  if(name.includes('microsoft')) score += 2;
  if(name.includes('compact')) score -= 2;
  return score;
}

function loadVoices(){
  const all = window.speechSynthesis.getVoices();
  italianVoices = all.filter(v=>v.lang && v.lang.toLowerCase().startsWith('it'));
  italianVoices.sort((a,b)=>rankVoice(b)-rankVoice(a));

  voiceSelect.innerHTML = '';
  if(italianVoices.length === 0){
    const opt = document.createElement('option');
    opt.textContent = 'صدای ایتالیایی پیدا نشد';
    voiceSelect.appendChild(opt);
    return;
  }
  italianVoices.forEach((v,i)=>{
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name + (v.localService ? '' : ' ☁') ;
    voiceSelect.appendChild(opt);
  });
  voiceSelect.value = 0;
  chosenVoice = italianVoices[0];

  const preferredIdx = italianVoices.findIndex(v => (v.name||'').toLowerCase().includes('isabela'));
  if(preferredIdx !== -1){
    voiceSelect.value = preferredIdx;
    chosenVoice = italianVoices[preferredIdx];
  }
}

voiceSelect.addEventListener('change', ()=>{
  chosenVoice = italianVoices[voiceSelect.value];
});

if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, onend){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'it-IT';
    u.rate = 0.82;
    if(chosenVoice) u.voice = chosenVoice;
    if(onend) u.onend = onend;
    else u.onend = ()=>{};
    window.speechSynthesis.speak(u);
  }catch(e){
    console.warn('TTS not available', e);
    if(onend) onend();
  }
}

function speakQueue(texts, onEachStart, onAllDone){
  window.speechSynthesis.cancel();
  let i = 0;
  function step(){
    if(i >= texts.length){
      if(onAllDone) onAllDone();
      return;
    }
    const idx = i;
    if(onEachStart) onEachStart(idx);
    i++;
    speak(texts[idx], step);
  }
  // small delay so cancel() takes effect first
  setTimeout(step, 60);
}

function render(){
  const v = currentVerb();
  flipped = false;
  cardEl.classList.remove('flipped');

  frontWord.textContent = v.verb;
  frontCat.textContent = v.cat + ' · ' + v.group;
  backWord.textContent = v.verb;
  backFa.textContent = v.fa;
  exampleIt.textContent = v.example_it;
  exampleFa.textContent = v.example_fa;

  conjList.innerHTML = '';
  conjRows = [];
  const order6 = ['io','tu','lui/lei','noi','voi','loro'];
  order6.forEach(p=>{
    const f = v.forms[p];
    if(!f) return;
    const row = document.createElement('div');
    row.className = 'conj-row';
    row.innerHTML = `<span class="pronoun">${p}</span><span class="form">${f}</span>`;
    const btn = document.createElement('button');
    btn.className = 'play-btn small';
    btn.textContent = '🔊';
    btn.onclick = (e)=>{ e.stopPropagation(); window.speechSynthesis.cancel(); speak(f); };
    row.appendChild(btn);
    conjList.appendChild(row);
    conjRows.push(row);
  });

  counter.textContent = toFaDigits(pos+1) + ' / ' + toFaDigits(order.length);
  renderHistory();
  renderStats();
}

function renderHistory(){
  const v = currentVerb();
  const hist = progress[v.verb] || [];
  historyEl.innerHTML = '';
  const last8 = hist.slice(-8);
  while(last8.length < 8) last8.unshift(null);
  last8.forEach(h=>{
    const box = document.createElement('div');
    box.className = 'hist-box' + (h===true ? ' green' : h===false ? ' red' : '');
    historyEl.appendChild(box);
  });
}

function renderStats(){
  let total=0, correct=0;
  Object.values(progress).forEach(arr=>{
    arr.forEach(h=>{ total++; if(h) correct++; });
  });
  statsEl.textContent = total > 0
    ? `مجموع پاسخ‌ها: ${toFaDigits(total)} · درست: ${toFaDigits(correct)} (${toFaDigits(Math.round(correct/total*100))}٪)`
    : 'هنوز پاسخی ثبت نشده';
}

function markAnswer(isCorrect){
  const v = currentVerb();
  if(!progress[v.verb]) progress[v.verb] = [];
  progress[v.verb].push(isCorrect);
  if(progress[v.verb].length > 8) progress[v.verb] = progress[v.verb].slice(-8);
  saveProgress();
  renderHistory();
  renderStats();
  goNext();
}

function goNext(){
  window.speechSynthesis.cancel();
  pos = (pos + 1) % order.length;
  render();
}
function goPrev(){
  window.speechSynthesis.cancel();
  pos = (pos - 1 + order.length) % order.length;
  render();
}

function playFullSequence(){
  const v = currentVerb();
  const order6 = ['io','tu','lui/lei','noi','voi','loro'];
  const texts = [v.verb, ...order6.map(p=>v.forms[p]).filter(Boolean)];
  conjRows.forEach(r=>r.classList.remove('playing'));
  speakQueue(texts, (idx)=>{
    conjRows.forEach(r=>r.classList.remove('playing'));
    if(idx > 0 && conjRows[idx-1]) conjRows[idx-1].classList.add('playing');
  }, ()=>{
    conjRows.forEach(r=>r.classList.remove('playing'));
  });
}

cardEl.addEventListener('click', ()=>{
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
  window.speechSynthesis.cancel();
});

document.getElementById('flipBtn').addEventListener('click', ()=>{
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
  window.speechSynthesis.cancel();
});

document.getElementById('playFront').addEventListener('click', (e)=>{
  e.stopPropagation();
  window.speechSynthesis.cancel();
  speak(currentVerb().verb);
});
document.getElementById('playBack').addEventListener('click', (e)=>{
  e.stopPropagation();
  window.speechSynthesis.cancel();
  speak(currentVerb().verb);
});

document.getElementById('correctBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  markAnswer(true);
});
document.getElementById('wrongBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  markAnswer(false);
});

document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('prevBtn').addEventListener('click', goPrev);

document.getElementById('resetProgressBtn').addEventListener('click', ()=>{
  if(confirm('سابقه پیشرفت همه فعل‌ها پاک شود؟')){
    progress = {};
    saveProgress();
    renderHistory();
    renderStats();
  }
});

categoryFilter.addEventListener('change', ()=>{ buildOrder(); render(); });
orderMode.addEventListener('change', ()=>{ buildOrder(); render(); });

buildOrder();
render();
</script>
</body>
